name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: survey
          POSTGRES_PASSWORD: survey
          POSTGRES_DB: survey
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U survey -d survey"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://survey:survey@localhost:5432/survey
      ENVIRONMENT: test
      COOKIE_SECURE: "false"

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y gcc libpq-dev

      - name: Install Python dependencies
        run: pip install -e '.[dev]'

      - name: Smoke-test imports
        run: python -c "from app.database import engine; from app.config import settings"

      - name: Run bandit security scan
        run: bandit -r app/ -c pyproject.toml -ll

      - name: Run tests
        run: pytest --tb=short -q

  frontend:
    name: Frontend (lint + typecheck + build + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
